name: Deal Tracker

on:
  workflow_dispatch:
    inputs:
      product_id:
        description: 'Product ID to scrape (leave empty to run all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright

      - name: Install Chromium browser
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          FB_EMAIL:           ${{ secrets.FB_EMAIL }}
          FB_PASSWORD:        ${{ secrets.FB_PASSWORD }}
          GMAIL_EMAIL:        ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          PRODUCT_ID:         ${{ github.event.inputs.product_id }}
        run: python scraper.py

      - name: Commit updated results
        run: |
          git config user.name  "tracker-bot"
          git config user.email "action@github.com"
          git add results/
          git diff --staged --quiet || git commit -m "chore: update results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
